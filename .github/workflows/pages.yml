name: Deploy to GitHub Pages

# Builds the web (Vite) bundle and publishes it to GitHub Pages on every push to
# main. The desktop release lives in release.yml; this is the browser-playable
# build at https://miskibin.github.io/tileworld/. Vite's base is './' (relative),
# so the bundle works unchanged from the repo sub-path.
on:
  push:
    branches:
      - main
  workflow_dispatch:

# GITHUB_TOKEN needs pages:write + id-token:write to publish; contents:read to
# check out. Concurrency: only one live deploy, don't cancel an in-flight one.
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
